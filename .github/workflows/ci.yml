name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Sanitization scan before install
        run: python scripts/sanitize_scan.py .
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -e .
      - name: Unit tests
        run: coverage run -m unittest discover -s tests
      - name: Coverage report
        run: |
          coverage report --fail-under=80
          coverage xml
          coverage json -o /tmp/gbm_coverage.json
      - name: Coverage badge is current
        run: |
          python scripts/write_coverage_badge.py /tmp/gbm_coverage.json docs/assets/coverage.svg
          git diff --exit-code docs/assets/coverage.svg
      - name: CLI JSON smoke
        run: python -m gbm_inverse_potential.cli --json
      - name: Demo smoke
        run: python examples/harmonic_oscillator_demo.py
      - name: Expanded examples smoke
        run: |
          python examples/moment_series_comparison.py --json
          python examples/alpha_sweep_smoke.py --json --alphas 1.0
      - name: Public figure smoke
        run: >
          python scripts/reproduce_public_demo_figure.py
          --output /tmp/gbm_public_demo_density.svg
      - name: Sanitization scan after install
        run: python scripts/sanitize_scan.py .
